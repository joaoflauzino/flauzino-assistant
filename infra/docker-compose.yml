  #     - GEMINI_API_KEY=${GOOGLE_API_KEY}
  #     - MODEL_NAME=${MODEL_NAME:-gemini-2.0-flash-exp}
  #     - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-flauzino}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-assistant}
  #   depends_on:
  #     - db
  #     - finance_api
  #   networks:
  #     - default

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - finance_api
    networks:
      - default
